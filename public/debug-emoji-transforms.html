<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">

<title>Emoji еҸҳжҚўе®ЎжҹҘ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui; padding: 10px; background: #fff; }
h2 { font-size: 14px; margin: 20px 0 8px; padding: 4px 8px; background: #333; color: #fff; display: flex; align-items: center; justify-content: space-between; }
h2 .group-checks { display: flex; gap: 8px; }
h2 label { font-weight: normal; font-size: 12px; color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 2px; }
h2 label input { cursor: pointer; }
.row { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 4px 0; }
.emoji-name { width: 50px; text-align: center; font-size: 11px; color: #666; flex-shrink: 0; }
.cell { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; font-size: 48px; border: 1px solid #f0f0f0; margin: 0 2px; flex-shrink: 0; }
.checks { display: flex; gap: 6px; align-items: center; margin-left: 8px; flex-shrink: 0; }
.checks label { font-size: 11px; color: #666; cursor: pointer; display: flex; align-items: center; gap: 2px; }
.checks input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; }
.header { display: flex; align-items: center; padding: 4px 0; font-size: 11px; font-weight: bold; color: #999; }
.header span { width: 64px; text-align: center; margin: 0 2px; flex-shrink: 0; }
.header .emoji-name { width: 50px; }

/* еҜјеҮәж Ҹ */
#export-bar {
  position: sticky; top: 0; z-index: 100;
  background: #1a1a2e; color: #fff; padding: 8px 12px;
  display: flex; align-items: center; gap: 12px;
  border-radius: 6px; margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
#export-bar button {
  padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600;
}
#btn-export { background: #4ade80; color: #000; }
#btn-copy { background: #60a5fa; color: #000; }
#btn-clear { background: #f87171; color: #fff; }
#export-bar .stats { font-size: 12px; color: #aaa; }
#toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 8px 20px; border-radius: 6px;
  font-size: 13px; opacity: 0; transition: opacity .3s; z-index: 999; pointer-events: none;
}
#toast.show { opacity: 1; }
#export-modal {
  display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.5);
  justify-content: center; align-items: center;
}
#export-modal.show { display: flex; }
#export-modal .modal-content {
  background: #fff; border-radius: 8px; padding: 16px; max-width: 90vw; max-height: 80vh;
  display: flex; flex-direction: column; gap: 10px;
}
#export-modal textarea {
  width: 600px; max-width: 80vw; height: 400px; font-family: monospace; font-size: 12px;
  border: 1px solid #ddd; border-radius: 4px; padding: 8px; resize: vertical;
}
#export-modal .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; }
#export-modal button {
  padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
}
</style>
</head>
<body>

  <button id="btn-clear">рҹ—‘ жё…з©ә</button>

<div id="export-modal">

    <div class="modal-buttons">
      <button id="btn-modal-copy" style="background:#60a5fa">еӨҚеҲ¶</button>
      <button id="btn-modal-close" style="background:#e5e7eb">е…ій—ӯ</button>

  shapes: ['в–І','в–і','в—Ҷ','в—Ү','в–ә','в–·','в—„','в—Ғ','в–ј','вҳ…','вҳҶ','в—Ҹ','в—Ӣ','в– ','в–Ў'],

  hanzi3: ['жЈҳ','жһЈ','еЈҒ','з’§','зқӣ','жҷҙ','жғ…','жё…','иҜ·','зІҫ','иң»','йқ–','иҸҒ','еҖ©','е©§'],
  fruits: ['рҹҚҺ','рҹҚҗ','рҹҚҠ','рҹҚӢ','рҹҚҢ','рҹҚү','рҹҚҮ','рҹҚ“','рҹ«җ','рҹҚҲ','рҹҚ’','рҹҚ‘','рҹҘӯ','рҹҚҚ','рҹҘқ'],
  vegetables: ['рҹҘ•','рҹҢҪ','рҹҘҰ','рҹ§„','рҹ§…','рҹҘ”','рҹҚҶ','рҹҘ’','рҹҢ¶пёҸ','рҹ«‘','рҹҘ¬','рҹҘң','рҹ«ҳ','рҹҚ„','рҹҘ‘'],
  food: ['рҹҚ”','рҹҢӯ','рҹҚ•','рҹҘӘ','рҹҢ®','рҹҢҜ','рҹҚң','рҹҚІ','рҹҚӣ','рҹҚЈ','рҹҚұ','рҹҘҹ','рҹҚӨ','рҹҚҷ','рҹҘҳ'],
  sports: ['вҡҪ','рҹҸҖ','рҹҸҲ','вҡҫ','рҹҺҫ','рҹҸҗ','рҹҸү','рҹҺұ','рҹҸ“','рҹҸё','рҹҘҠ','рҹҺҜ','рҹҺі','рҹҸ’','рҹҘҢ'],
  flowers: ['рҹҢё','рҹҢ№','рҹҢә','рҹҢ»','рҹҢј','рҹҢ·','рҹ’җ','рҹӘ»','рҹҢҫ','рҹӘ·','рҹҢө','рҹҺӢ','рҹҺҚ','вҳҳпёҸ','рҹҚҖ'],
  hearts: ['вқӨпёҸ','рҹ’ң','рҹ’ҷ','рҹ’ҡ','рҹ’ӣ','рҹ§Ў','рҹӨҚ','рҹ–Ө','рҹӨҺ','рҹ’—','рҹ’қ','рҹ’ҳ','рҹ’–','вқӨпёҸвҖҚрҹ”Ҙ','рҹ’•'],
  sweets: ['рҹҚҰ','рҹ§Ғ','рҹҚ°','рҹҚ«','рҹҚ¬','рҹҚӯ','рҹҚӘ','рҹ§Ү','рҹҘһ','рҹҚЎ','рҹҚ®','рҹ§ғ','рҹҚ§','рҹҚЁ','рҹҘ®'],
  christmas: ['рҹҺ„','рҹҺ…','рҹӨ¶','рҹҺҒ','вӣ„','вқ„пёҸ','рҹҰҢ','рҹ””','рҹ•ҜпёҸ','рҹ§Ұ','рҹӘ…','рҹҺҠ','рҹҺү','вңЁ','рҹҢҹ'],
  gems: ['рҹ’Һ','рҹ”®','рҹ’Қ','рҹ‘‘','рҹҸ…','рҹҺ–пёҸ','рҹҘҮ','рҹҘҲ','рҹҘү','рҹҸҶ','рҹӘ©','рҹ”¶','рҹ”·','рҹ”ё','рҹ”№'],
  buildings: ['рҹҸ ','рҹҸў','рҹҸҘ','рҹҸ«','рҹҸ°','рҹ—ј','вӣӘ','рҹҸӣпёҸ','рҹҸҹпёҸ','рҹ•Ң','рҹ•Қ','вӣ©пёҸ','рҹҸ—пёҸ','рҹҸӯ','рҹҸ¬'],
  clothing: ['рҹ‘•','рҹ‘–','рҹ‘—','рҹ§Ҙ','рҹ‘ ','рҹҺ©','рҹ§ў','рҹ‘ҹ','рҹ‘”','рҹ‘ҳ','рҹҘҝ','рҹ‘ў','рҹ§Ө','рҹ§Ј','рҹ‘’'],
  furniture: ['рҹӣӢпёҸ','рҹӘ‘','рҹӣҸпёҸ','рҹҡҝ','рҹ§№','рҹӘЈ','рҹ§ә','рҹ’Ў','рҹӘҹ','рҹҡӘ','рҹӘһ','рҹ§ё','рҹ–јпёҸ','рҹӣҒ','рҹӘҙ'],
  drinks: ['вҳ•','рҹҚө','рҹҘӨ','рҹ§Ӣ','рҹҚә','рҹҚ·','рҹҘӮ','рҹҚҫ','рҹ§ғ','рҹҘӣ','рҹҚ№','рҹҚё','рҹ«–','рҹҚ¶','рҹҘғ'],
  clocks: ['рҹ•җ','рҹ•‘','рҹ•’','рҹ•“','рҹ•”','рҹ••','рҹ•–','рҹ•—','рҹ•ҳ','рҹ•ҷ','рҹ•ҡ','рҹ•ӣ','вҸ°','вҸі','вҢӣ'],
  zodiac: ['вҷҲ','вҷү','вҷҠ','вҷӢ','вҷҢ','вҷҚ','вҷҺ','вҷҸ','вҷҗ','вҷ‘','вҷ’','вҷ“','вӣҺ','рҹ”Ҝ','вҳҜпёҸ'],
  faces: ['рҹҳҖ','рҹҳӮ','рҹҘ№','рҹҳҺ','рҹӨ”','рҹҳҙ','рҹӨў','рҹҳЎ','рҹҘ¶','рҹӨҜ','рҹҳұ','рҹӨ—','рҹ«Ў','рҹҳҸ','рҹҘә'],
  hands: ['рҹ‘Қ','рҹ‘Һ','вңҢпёҸ','рҹӨһ','рҹӨҹ','рҹӨҷ','рҹ‘Ҡ','вңҠ','рҹӨқ','рҹ‘Ҹ','рҹҷҢ','рҹӨІ','рҹ‘җ','рҹ’Ә','рҹ«¶'],
  music: ['рҹҺө','рҹҺ¶','рҹҺё','рҹҺ№','рҹҘҒ','рҹҺә','рҹҺ»','рҹӘ—','рҹҺ·','рҹҺӨ','рҹҺ§','рҹ“Ҝ','рҹӘҲ','рҹ””','рҹҺј'],
  objects: ['рҹ”‘','рҹ—қпёҸ','рҹ”’','рҹ”“','рҹ’Ў','рҹ”Ұ','рҹ•ҜпёҸ','рҹ“Һ','вңӮпёҸ','рҹ–ҠпёҸ','рҹ“Ң','рҹ“Ҹ','рҹ“җ','рҹ”Қ','вҸ°'],
  weather: ['вҳҖпёҸ','рҹҢӨпёҸ','вӣ…','рҹҢ§пёҸ','вӣҲпёҸ','рҹҢ©пёҸ','вқ„пёҸ','рҹ’Ё','рҹҢҠ','рҹҢҲ','рҹҢӘпёҸ','рҹҢ«пёҸ','вҳ”','вҡЎ','рҹҢЎпёҸ'],
};

// зҠ¶жҖҒпјҡ{ group: { emoji: { axial: bool, central: bool } } }
const state = {};

// д»Һ localStorage жҒўеӨҚ
try {
  const saved = localStorage.getItem('emoji-transform-checks');
  if (saved) Object.assign(state, JSON.parse(saved));
} catch(e) {}

function saveState() {
  localStorage.setItem('emoji-transform-checks', JSON.stringify(state));
  updateStats();
}

function getCheck(group, emoji, type) {
  return state[group]?.[emoji]?.[type] || false;
}

function setCheck(group, emoji, type, val) {
  if (!state[group]) state[group] = {};
  if (!state[group][emoji]) state[group][emoji] = {};
  state[group][emoji][type] = val;
  // жё…зҗҶз©әйЎ№
  if (!state[group][emoji].axial && !state[group][emoji].central) {
    delete state[group][emoji];
    if (Object.keys(state[group]).length === 0) delete state[group];
  }
  saveState();
}

function updateStats() {
  let axialCount = 0, centralCount = 0;
  for (const g of Object.values(state)) {
    for (const e of Object.values(g)) {
      if (e.axial) axialCount++;
      if (e.central) centralCount++;
    }
  }
  document.getElementById('stats').textContent =
    `е·ІйҖү: ${axialCount} иҪҙеҜ№з§° / ${centralCount} дёӯеҝғеҜ№з§°`;
}

function buildExportJSON() {
  // иҫ“еҮәж јејҸпјҡжҢүз»„еҲҶзұ»пјҢжҜҸз»„еҲ—еҮә axial е’Ң central ж•°з»„
  const result = {};
  for (const [groupName, emojis] of Object.entries(EMOJI_GROUPS)) {
    const axial = [];
    const central = [];
    for (const emoji of emojis) {
      if (getCheck(groupName, emoji, 'axial')) axial.push(emoji);
      if (getCheck(groupName, emoji, 'central')) central.push(emoji);
    }
    if (axial.length || central.length) {
      result[groupName] = {};
      if (axial.length) result[groupName].axial = axial;
      if (central.length) result[groupName].central = central;
    }
  }
  return result;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// жёІжҹ“
const root = document.getElementById('root');
const transforms = [
  { name: 'none', css: '' },
  { name: 'rotate-90', css: 'transform:rotate(90deg)' },
  { name: 'rotate-180', css: 'transform:rotate(180deg)' },
  { name: 'rotate-270', css: 'transform:rotate(270deg)' },
  { name: 'mirror-h', css: 'transform:scaleX(-1)' },
  { name: 'mirror-v', css: 'transform:scaleY(-1)' },
  { name: 'scale-down', css: 'font-size:24px' },
  { name: 'scale-up', css: 'font-size:60px' },
];

for (const [groupName, emojis] of Object.entries(EMOJI_GROUPS)) {
  const h2 = document.createElement('h2');

  const titleSpan = document.createElement('span');
  titleSpan.textContent = groupName + ' (' + emojis.length + ')';

  // з»„зә§е…ЁйҖү
  const groupChecks = document.createElement('div');
  groupChecks.className = 'group-checks';

  for (const type of ['axial', 'central']) {
    const label = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.addEventListener('change', () => {
      // е…ЁйҖү/еҸ–ж¶ҲиҜҘз»„жүҖжңү emoji зҡ„иҜҘзұ»еһӢ
      for (const emoji of emojis) {
        setCheck(groupName, emoji, type, cb.checked);
      }
      // жӣҙж–°иЎҢеҶ… checkbox
      const rows = root.querySelectorAll(`[data-group="${groupName}"] input[data-type="${type}"]`);
      rows.forEach(r => r.checked = cb.checked);
    });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(type === 'axial' ? 'е…ЁйҖүиҪҙ' : 'е…ЁйҖүдёӯеҝғ'));
    groupChecks.appendChild(label);
  }

  h2.appendChild(titleSpan);
  h2.appendChild(groupChecks);
  root.appendChild(h2);

  for (const emoji of emojis) {
    const row = document.createElement('div');
    row.className = 'row';
    row.setAttribute('data-group', groupName);

    const nameEl = document.createElement('div');
    nameEl.className = 'emoji-name';
    nameEl.textContent = emoji;
    row.appendChild(nameEl);

    for (const t of transforms) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = emoji;
      if (t.css) cell.style.cssText = t.css;
      row.appendChild(cell);
    }

    // еӢҫйҖүеҢә
    const checks = document.createElement('div');
    checks.className = 'checks';

    for (const type of ['axial', 'central']) {
      const label = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.setAttribute('data-type', type);
      cb.checked = getCheck(groupName, emoji, type);
      cb.addEventListener('change', () => {
        setCheck(groupName, emoji, type, cb.checked);
      });
      label.appendChild(cb);
      label.appendChild(document.createTextNode(type === 'axial' ? 'иҪҙ' : 'дёӯеҝғ'));
      checks.appendChild(label);
    }

    row.appendChild(checks);
    root.appendChild(row);
  }
}

updateStats();

// еҜјеҮәжҢүй’®
document.getElementById('btn-export').addEventListener('click', () => {
  const json = JSON.stringify(buildExportJSON(), null, 2);
  document.getElementById('export-text').value = json;
  document.getElementById('export-modal').classList.add('show');
});

document.getElementById('btn-copy').addEventListener('click', () => {
  const json = JSON.stringify(buildExportJSON(), null, 2);
  navigator.clipboard.writeText(json).then(() => toast('е·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝ'));
});

document.getElementById('btn-clear').addEventListener('click', () => {
  if (!confirm('зЎ®е®ҡжё…з©әжүҖжңүеӢҫйҖүпјҹ')) return;
  for (const key of Object.keys(state)) delete state[key];
  saveState();
  root.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
  toast('е·Іжё…з©ә');
});

document.getElementById('btn-modal-copy').addEventListener('click', () => {
  const ta = document.getElementById('export-text');
  navigator.clipboard.writeText(ta.value).then(() => toast('е·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝ'));
});

document.getElementById('btn-modal-close').addEventListener('click', () => {
  document.getElementById('export-modal').classList.remove('show');
});
</script>
