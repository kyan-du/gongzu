<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Stepped progress bars (日拱一卒 = daily steps forward) -->
  <rect x="6" y="44" width="12" height="14" rx="3" fill="#E5E7EB"/>
  <rect x="22" y="32" width="12" height="26" rx="3" fill="#9CA3AF"/>
  <rect x="38" y="20" width="12" height="38" rx="3" fill="#4B5563"/>
  <!-- The pawn at the top of progress -->
  <circle cx="50" cy="12" r="8" fill="#111827"/>
  <text x="50" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="system-ui">卒</text>
</svg>
